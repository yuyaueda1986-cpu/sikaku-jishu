<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自習サイト</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
</head>
<body>
  <main>
    <section id="home" class="screen active">
      <!-- HomeView がレンダリング -->
    </section>

    <section id="setup" class="screen">
      <!-- SetupView がレンダリング -->
    </section>

    <section id="quiz" class="screen">
      <!-- QuizView がレンダリング -->
    </section>

    <section id="result" class="screen">
      <!-- ResultView がレンダリング -->
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "marked": "https://cdn.jsdelivr.net/npm/marked@17/lib/marked.esm.js",
      "marked-katex-extension": "https://cdn.jsdelivr.net/npm/marked-katex-extension/+esm"
    }
  }
  </script>
  <script type="module">
    import { ScreenManager } from './js/screen-manager.js';
    import { DataLoader } from './js/data-loader.js';
    import { QuizEngine } from './js/quiz-engine.js';
    import { CopyHelper } from './js/copy-helper.js';
    import { HomeView } from './js/home-view.js';
    import { SetupView } from './js/setup-view.js';
    import { QuizView } from './js/quiz-view.js';
    import { ResultView } from './js/result-view.js';
    import { App } from './js/app.js';
    import { MarkdownRenderer } from './js/markdown-renderer.js';

    let markdownRenderer;
    try {
      const { marked } = await import('marked');
      const { default: markedKatexExtension } = await import('marked-katex-extension');
      markdownRenderer = new MarkdownRenderer({ markedLib: marked, markedKatexLib: markedKatexExtension });
    } catch (_e) {
      markdownRenderer = new MarkdownRenderer();
    }

    const app = new App({
      screenManager: new ScreenManager(document),
      dataLoader: new DataLoader(),
      homeView: new HomeView(document.getElementById('home')),
      setupView: new SetupView(document.getElementById('setup')),
      quizEngine: new QuizEngine(),
      quizView: new QuizView(document.getElementById('quiz')),
      resultView: new ResultView(document.getElementById('result')),
      copyHelper: new CopyHelper(),
      markdownRenderer,
      win: window,
    });
    app.init().catch((err) => {
      console.error('初期化エラー:', err);
    });
  </script>
</body>
</html>
